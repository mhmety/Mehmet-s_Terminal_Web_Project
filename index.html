<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehmet Yildiz - Portfolio & Task Log</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-black text-white m-0">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function Header() {
            return (
                <header className="font-mono text-[#ffff33] select-none">
                    <h1 className="text-3xl font-bold mb-2">&gt; mehmet's terminal</h1>
                    <p className="text-gray-400 mb-4"># dev_workspace - STATUS: ACTIVE</p>
                    <nav className="flex space-x-6 text-sm mb-6">
                        <span className="text-gray-500">#</span>
                        <a href="#" className="underline decoration-dashed hover:text-white">root</a>
                        <a href="#" className="underline decoration-dashed hover:text-white">projects</a>
                        <a href="#" className="underline decoration-dashed hover:text-white">tech_stack</a>
                        <a href="#" className="underline decoration-dashed hover:text-white">logs</a>
                    </nav>
                    <hr className="border-gray-800 border-dashed mb-8" />
                </header>
            );
        }

        function ItemList({ items, onEdit, onDelete, onAddSubTask, onToggleSubTask, onDeleteSubTask }) {
            const [expandedItems, setExpandedItems] = useState({});
            const [subTaskInputs, setSubTaskInputs] = useState({});

            const toggleExpand = (id) => {
                setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));
            };

            const handleSubTaskSubmit = (e, itemId) => {
                e.preventDefault();
                const text = subTaskInputs[itemId] || '';
                if (!text.trim()) return;
                onAddSubTask(itemId, text);
                setSubTaskInputs(prev => ({ ...prev, [itemId]: '' }));
            };

            return (
                <div className="font-mono text-white mt-4">
                    <p className="text-[#ffff33] mb-4">&gt; active_project_log / mevcut_projeler:</p>
                    {items.length === 0 ? (
                        <p className="text-gray-500 text-sm italic pl-4">[Sistem]: Log kaydı bulunamadı. Yeni bir proje ekleyin.</p>
                    ) : (
                        <ul className="space-y-4 pl-4">
                            {items.map((item) => {
                                const isExpanded = expandedItems[item.id];
                                return (
                                    <li key={item.id} className="border-l border-gray-900 pl-3">
                                        <div className="group flex items-center justify-between max-w-2xl text-[#ffff33]">
                                          <div className="flex items-center gap-2 cursor-pointer select-none" onClick={() => toggleExpand(item.id)}>
                                            <span className="text-green-500 font-bold inline-block">
                                              {isExpanded ? '▼' : '▶'}
                                            </span>
                                            <span className="text-white hover:text-[#ffff33] font-medium transition-colors">
                                              {item.text}
                                            </span>
                                            <span className="text-xs text-gray-600">({item.subTasks?.length || 0} alt_adim)</span>
                                          </div>
                                          <div className="text-xs space-x-2 opacity-60 group-hover:opacity-100 transition-opacity">
                                            <button onClick={() => onEdit(item)} className="text-blue-400 hover:underline">[düzenle]</button>
                                            <button onClick={() => onDelete(item.id)} className="text-red-500 hover:underline">[sil]</button>
                                          </div>
                                        </div>

                                        {isExpanded && (
                                            <div className="mt-2 pl-6 space-y-2 border-l border-dashed border-gray-800 ml-1.5">
                                                {item.subTasks && item.subTasks.map((sub) => (
                                                    <div key={sub.id} className="flex items-center justify-between max-w-xl text-sm group/sub">
                                                        <div 
                                                            className={`flex items-center gap-2 cursor-pointer select-none ${sub.completed ? 'line-through text-gray-600' : 'text-gray-300'}`}
                                                            onClick={() => onToggleSubTask(item.id, sub.id)}
                                                        >
                                                            <span>{sub.completed ? '[✓]' : '[ ]'}</span>
                                                            <span>{sub.text}</span>
                                                        </div>
                                                        <button 
                                                            onClick={() => onDeleteSubTask(item.id, sub.id)}
                                                            className="text-xs text-red-700 hover:underline opacity-0 group-hover/sub:opacity-100 transition-opacity"
                                                        >
                                                            [sil]
                                                        </button>
                                                    </div>
                                                ))}

                                                <form onSubmit={(e) => handleSubTaskSubmit(e, item.id)} className="flex gap-2 pt-1 max-w-md">
                                                    <span className="text-gray-600 text-sm font-bold">+</span>
                                                    <input
                                                        type="text"
                                                        value={subTaskInputs[item.id] || ''}
                                                        onChange={(e) => setSubTaskInputs(prev => ({ ...prev, [item.id]: e.target.value }))}
                                                        placeholder="Yeni alt adim ekle..."
                                                        className="flex-1 bg-transparent border-b border-gray-800 text-gray-400 focus:text-white text-xs focus:outline-none focus:border-[#ffff33] pb-0.5"
                                                    />
                                                    <button type="submit" className="text-xs text-[#33ff33] hover:underline">[ekle]</button>
                                                </form>
                                            </div>
                                        )}
                                    </li>
                                );
                            })}
                        </ul>
                    )}
                </div>
            );
        }

        function ItemForm({ onSave, currentItem, setEditingItem }) {
            const [text, setText] = useState('');

            useEffect(() => {
                if (currentItem) setText(currentItem.text);
                else setText('');
            }, [currentItem]);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!text.trim()) return;
                onSave(text);
                setText('');
            };

            return (
                <form onSubmit={handleSubmit} className="font-mono mt-8 p-4 border border-dashed border-gray-800 rounded bg-[#0a0a0a]">
                    <p className="text-[#33ff33] mb-2">
                        {currentItem ? '$ update --target project' : '$ insert --target project'}
                    </p>
                    <div className="flex gap-2">
                        <input
                            type="text"
                            value={text}
                            onChange={(e) => setText(e.target.value)}
                            placeholder="Yeni proje başlığı veya kategori logu gir..."
                            className="flex-1 bg-black border border-gray-700 text-white p-2 focus:outline-none focus:border-[#ffff33] text-sm"
                        />
                        <button type="submit" className="bg-[#ffff33] text-black px-4 py-2 text-sm font-bold hover:bg-yellow-400 transition-colors">
                            {currentItem ? 'UPDATE' : 'COMMIT'}
                        </button>
                        {currentItem && (
                            <button type="button" onClick={() => setEditingItem(null)} className="border border-red-500 text-red-500 px-3 py-2 text-sm hover:bg-red-950 transition-colors">
                                ABORT
                            </button>
                        )}
                    </div>
                </form>
            );
        }

        function Home() {
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem('retro_items_v2');
                return saved ? JSON.parse(saved) : [
                    { 
                        id: '1', 
                        text: 'Huawei & Spheretech Data Science Bootcamp', 
                        subTasks: [
                            { id: '1-1', text: 'Numpy ve Pandas ile Veri Manipülasyonu', completed: true },
                            { id: '1-2', text: 'Özellik Mühendisliği (Feature Engineering)', completed: false },
                            { id: '1-3', text: 'Makine Öğrenmesi Modellerinin Dağıtılması', completed: false }
                        ] 
                    },
                    { 
                        id: '2', 
                        text: 'Automated Code Reviewer Pipeline', 
                        subTasks: [
                            { id: '2-1', text: 'n8n Webhook Yapılandırması', completed: true },
                            { id: '2-2', text: 'Ollama ve Yerel LLM Entegrasyonu', completed: true }
                        ] 
                    }
                ];
            });
            
            const [editingItem, setEditingItem] = useState(null);

            useEffect(() => {
                localStorage.setItem('retro_items_v2', JSON.stringify(items));
            }, [items]);

            const handleSaveItem = (text) => {
                if (editingItem) {
                    setItems(items.map(i => i.id === editingItem.id ? { ...i, text } : i));
                    setEditingItem(null);
                } else {
                    setItems([...items, { id: Date.now().toString(), text, subTasks: [] }]);
                }
            };

            const handleDeleteItem = (id) => {
                setItems(items.filter(i => i.id !== id));
                if (editingItem?.id === id) setEditingItem(null);
            };

            const handleAddSubTask = (itemId, subTaskText) => {
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        const newSub = { id: Date.now().toString(), text: subTaskText, completed: false };
                        return { ...item, subTasks: [...(item.subTasks || []), newSub] };
                    }
                    return item;
                }));
            };

            const handleToggleSubTask = (itemId, subTaskId) => {
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        return {
                            ...item,
                            subTasks: item.subTasks.map(sub => sub.id === subTaskId ? { ...sub, completed: !sub.completed } : sub)
                        };
                    }
                    return item;
                }));
            };

            const handleDeleteSubTask = (itemId, subTaskId) => {
                setItems(items.map(item => {
                    if (item.id === itemId) {
                        return {
                            ...item,
                            subTasks: item.subTasks.filter(sub => sub.id !== subTaskId)
                        };
                    }
                    return item;
                }));
            };

            return (
                <div className="min-h-screen p-8 md:p-16 max-w-4xl mx-auto">
                    <Header />
                    <div className="font-mono space-y-4 text-sm md:text-base mb-8">
                        <p className="text-[#ffff33]">
                            &gt; Merhaba, ben Mehmet. Bilişim Sistemleri ve Teknolojileri mezunuyum. Yazılım geliştirme, veri analitiği ve makine öğrenmesi sistemleri üzerine çalışıyorum.
                        </p>
                        <p className="text-[#ffff33]">
                            &gt; Çalışmalarıma ve açık kaynak kodlu repository'lerime{" "}
                            <a 
                                href="https://github.com/mhmety" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="underline decoration-dashed cursor-pointer hover:text-white transition-colors"
                            >
                                GitHub
                            </a>{" "}
                            üzerinden erişebilir, benimle{" "}
                            <a 
                                href="https://www.linkedin.com/in/mehmetyildizbst/" 
                                target="_blank" 
                                rel="noopener noreferrer" 
                                className="underline decoration-dashed cursor-pointer hover:text-white transition-colors"
                            >
                                LinkedIn
                            </a>{" "}
                            aracılığıyla iletişime geçebilirsiniz.
                        </p>
                    </div>
                    <ItemList 
                        items={items} 
                        onEdit={setEditingItem} 
                        onDelete={handleDeleteItem} 
                        onAddSubTask={handleAddSubTask}
                        onToggleSubTask={handleToggleSubTask}
                        onDeleteSubTask={handleDeleteSubTask}
                    />
                    <ItemForm onSave={handleSaveItem} currentItem={editingItem} setEditingItem={setEditingItem} />
                    <footer className="font-mono text-xs text-gray-600 mt-16 pt-4 border-t border-gray-900">
                        sys_admin@mehmet_yildiz:~$ exit
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Home />);
    </script>
</body>
</html>
